<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
<!-- Floating notebook -->
<g transform="translate(60,40) rotate(-8)">
<rect x="0" y="0" width="180" height="230" rx="12" fill="#ffffff"/>
<rect x="0" y="0" width="36" height="230" rx="12" fill="#198754"/>
<circle cx="18" cy="30" r="5" fill="#fff"/>
<circle cx="18" cy="60" r="5" fill="#fff"/>
<circle cx="18" cy="90" r="5" fill="#fff"/>
<circle cx="18" cy="120" r="5" fill="#fff"/>
<circle cx="18" cy="150" r="5" fill="#fff"/>
<circle cx="18" cy="180" r="5" fill="#fff"/>
<line x1="55" y1="40" x2="160" y2="40" stroke="#e8eef9" stroke-width="5"/>
<line x1="55" y1="65" x2="160" y2="65" stroke="#e8eef9" stroke-width="5"/>
<line x1="55" y1="90" x2="130" y2="90" stroke="#e8eef9" stroke-width="5"/>
<line x1="55" y1="120" x2="160" y2="120" stroke="#0B5ED7" stroke-width="5" opacity="0.3"/>
<line x1="55" y1="145" x2="140" y2="145" stroke="#e8eef9" stroke-width="5"/>
</g>
<!-- Pen -->
<g transform="translate(260,60) rotate(25)">
<rect x="0" y="0" width="26" height="180" rx="8" fill="#0B5ED7"/>
<rect x="0" y="0" width="26" height="45" rx="8" fill="#198754"/>
<polygon points="0,180 26,180 13,210" fill="#333"/>
<rect x="8" y="-12" width="10" height="14" fill="#198754"/>
</g>
<!-- Calculator -->
<g transform="translate(290,250)">
<rect x="0" y="0" width="110" height="150" rx="14" fill="#1a1a2e"/>
<rect x="12" y="14" width="86" height="36" rx="6" fill="#0dcaf0" opacity="0.9"/>
<g fill="#ffffff" opacity="0.92">
<rect x="12" y="62" width="18" height="18" rx="3"/>
<rect x="38" y="62" width="18" height="18" rx="3"/>
<rect x="64" y="62" width="18" height="18" rx="3"/>
<rect x="12" y="88" width="18" height="18" rx="3"/>
<rect x="38" y="88" width="18" height="18" rx="3"/>
<rect x="64" y="88" width="18" height="18" rx="3"/>
<rect x="12" y="114" width="70" height="18" rx="3" fill="#0B5ED7"/>
</g>
</g>
<!-- Geometry compass -->
<g transform="translate(140,290)">
<circle cx="40" cy="40" r="18" fill="none" stroke="#198754" stroke-width="5"/>
<line x1="40" y1="40" x2="40" y2="22" stroke="#198754" stroke-width="5"/>
<line x1="10" y1="90" x2="40" y2="40" stroke="#0B5ED7" stroke-width="5" stroke-linecap="round"/>
<line x1="70" y1="90" x2="40" y2="40" stroke="#0B5ED7" stroke-width="5" stroke-linecap="round"/>
</g>
<!-- Floating dots decoration -->
<circle cx="430" cy="100" r="8" fill="#fd7e14" opacity="0.5"/>
<circle cx="450" cy="200" r="5" fill="#198754" opacity="0.5"/>
<circle cx="50" cy="320" r="6" fill="#0B5ED7" opacity="0.5"/>
<circle cx="420" cy="350" r="10" fill="#dc3545" opacity="0.3"/>
</svg>
